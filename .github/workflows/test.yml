name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install -r requirements.txt
      - run: ruff check run.py tests
      - run: mypy run.py tests
      - run: pytest -q
      - run: python run.py --input data.csv --config config.yaml --output metrics.json --log-file run.log
      - name: Validate exact metrics schema
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          metrics = json.loads(Path("metrics.json").read_text(encoding="utf-8"))
          expected_keys = {
              "version",
              "rows_processed",
              "metric",
              "value",
              "latency_ms",
              "seed",
              "status",
          }
          assert set(metrics.keys()) == expected_keys
          assert metrics["version"] == "v1"
          assert metrics["metric"] == "signal_rate"
          assert metrics["seed"] == 42
          assert metrics["status"] == "success"
          assert isinstance(metrics["rows_processed"], int)
          assert isinstance(metrics["latency_ms"], int)
          assert isinstance(metrics["value"], float)
          assert 0 <= metrics["value"] <= 1
          PY
