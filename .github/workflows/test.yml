name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: mypy run.py pipeline_app tests
      - run: pytest -q
      - run: python run.py --input data.csv --config config.yaml --output metrics.json --log-file run.log
      - name: Validate deterministic metrics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import pandas as pd
          import yaml

          metrics = json.loads(Path("metrics.json").read_text(encoding="utf-8"))
          config = yaml.safe_load(Path("config.yaml").read_text(encoding="utf-8"))

          df = pd.read_csv("data.csv")
          rows_input = len(df)
          df["date"] = pd.to_datetime(df["date"], errors="coerce")
          df["close"] = pd.to_numeric(df["close"], errors="coerce")
          df = df.loc[df["close"].notna(), ["date", "open", "high", "low", "close", "volume"]]
          rows_valid = len(df)
          rows_dropped = rows_input - rows_valid
          df["rolling_mean"] = df["close"].rolling(
              window=config["window"], min_periods=config["window"]
          ).mean()
          valid_mask = df["rolling_mean"].notna()
          rows_used = int(valid_mask.sum())
          expected_signal_rate = float(
              f"{(df.loc[valid_mask, 'close'] > df.loc[valid_mask, 'rolling_mean']).mean():.4f}"
          )

          assert metrics["status"] == "success"
          assert metrics["metric"] == "signal_rate"
          assert metrics["signal_rate"] == expected_signal_rate
          assert metrics["value"] == expected_signal_rate
          assert metrics["coverage"] == float(f"{rows_used / rows_valid:.4f}")
          assert metrics["data_quality_score"] == float(f"{rows_valid / rows_input:.4f}")
          assert metrics["rows_input"] == rows_input
          assert metrics["rows_valid"] == rows_valid
          assert metrics["rows_dropped"] == rows_dropped
          assert metrics["rows_used"] == rows_used
          assert metrics["rows_input"] == metrics["rows_valid"] + metrics["rows_dropped"]
          assert metrics["rows_used"] <= metrics["rows_valid"]
          assert metrics["latency_ms"] >= 0
          PY
